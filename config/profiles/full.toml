# Profile: full
# Use case: Production - "Full game experience"
# Usage: ./recurse --config=config/profiles/full.toml
#
# Enables all modern systems. Only legacy systems disabled.
# Use this for complete game testing and demonstrations.

[features]
# === VP0+ Voxel Pipeline ===
voxel_simulation = true
voxel_meshing = true
voxel_rendering = true

# === Legacy Systems (disabled - deprecated) ===
legacy_density_field = false
legacy_water_sim = false
legacy_terrain_gen = false

# === Rendering (all enabled) ===
shadows = true
oit = true
post_process = true
debug_draw = true

# === Gameplay (all enabled) ===
physics = true
audio = true
particles = true
character_movement = true
behavior_ai = true

# === UI (all enabled) ===
rml_ui = true
debug_hud = true
waila = true
dev_console = true

# === Debug ===
tracy_profiling = true
verbose_logging = false
