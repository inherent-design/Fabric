# Profile: sky-only
# Use case: "Does the sky render at all?" - Minimal possible runtime
# Usage: ./recurse --config=config/profiles/sky-only.toml

[features]
# VP0+ Voxel Pipeline - ALL DISABLED
voxel_simulation = false
voxel_meshing = false
voxel_rendering = false

# Legacy - disabled
legacy_density_field = false
legacy_water_sim = false
legacy_terrain_gen = false

# Rendering - ONLY sky visible
shadows = false
oit = false
post_process = false
debug_draw = false

# Gameplay - ALL DISABLED
physics = false
audio = false
particles = false
character_movement = false
behavior_ai = false

# UI - minimal
rml_ui = false
debug_hud = false
waila = false
dev_console = false

# Debug
tracy_profiling = true
verbose_logging = true

[logging]
# Console: Fabric logs only, no bgfx/Vulkan noise
console_level = "debug"
console_include = ["fabric.*"]
file_level = "trace"
per_run_folders = true
