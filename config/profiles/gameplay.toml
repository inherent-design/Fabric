# Profile: gameplay
# Use case: Gameplay testing - "Test character movement"
# Usage: ./recurse --config=config/profiles/gameplay.toml
#
# Enables voxel pipeline, physics, character movement, and audio.
# Disables expensive rendering features (shadows, OIT, post-process) and AI.
# Good for testing core gameplay interactions without visual noise.

[features]
# === VP0+ Voxel Pipeline ===
voxel_simulation = true
voxel_meshing = true
voxel_rendering = true

# === Legacy Systems (disabled - clean break) ===
legacy_density_field = false
legacy_water_sim = false
legacy_terrain_gen = false

# === Rendering (minimal for performance) ===
shadows = false
oit = false
post_process = false
debug_draw = false

# === Gameplay (core enabled) ===
physics = true
audio = true
particles = false
character_movement = true
behavior_ai = false

# === UI (enabled for gameplay feedback) ===
rml_ui = true
debug_hud = true
waila = true
dev_console = true

# === Debug ===
tracy_profiling = true
verbose_logging = false

[logging]
# Gameplay testing: physics + fabric logs in console
console_level = "info"
console_include = ["fabric.*", "physics.*"]
file_level = "debug"
per_run_folders = true
