# Recurse application config.
# Overrides engine defaults. User preferences (user.toml) override these.

[window]
title = "Recurse"
borderless = true
fullscreen_desktop = true
hidpi = true

[terrain]
seed = 42
chunk_radius = 8         # full-res chunks at rest (cube radius in chunk coords)
chunk_radius_max = 12    # full-res chunks at max movement speed

[panini]
enabled = false
strength = 0.5
fov = 150.0
fill = 1.0
vertical_compensation = 0.0
