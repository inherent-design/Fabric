[settings]
windows_default_inline_shell_args = "pwsh -NoProfile -NonInteractive -Command"

[tools]
ccache = "latest"
cmake = "latest"
codeql = { version = "latest", bin_path = "codeql", platforms = """
[linux-x64]
asset_pattern = "codeql-linux64.zip"

[macos-arm64]
asset_pattern = "codeql-osx64.zip"

[macos-x64]
asset_pattern = "codeql-osx64.zip"

[windows-x64]
asset_pattern = "codeql-win64.zip"
""" }
ninja = "latest"

[env]
_.path = ["/opt/homebrew/opt/llvm/bin"]
CC = "clang"
CXX = "clang++"
CPPFLAGS = "-I/opt/homebrew/opt/llvm/include"
LDFLAGS = "-L/opt/homebrew/opt/llvm/lib"
CPM_SOURCE_CACHE = "~/.cache/CPM"
CMAKE_C_COMPILER_LAUNCHER = "ccache"
CMAKE_CXX_COMPILER_LAUNCHER = "ccache"

# Build

[tasks.clean]
description = "Remove build artifacts"
run = "sh tasks/clean.sh"
run_windows = "& .\\tasks\\clean.ps1"

[tasks.build]
alias = "b"
description = "Configure and build (Debug)"
run = "sh tasks/build.sh"
run_windows = "& .\\tasks\\build.ps1"

[tasks."build:release"]
alias = "br"
description = "Configure and build (Release)"
run = "BUILD_PRESET=dev-release sh tasks/build.sh"
run_windows = "$env:BUILD_PRESET='dev-release'; & .\\tasks\\build.ps1"

# Lint & Format

[tasks.format]
alias = "fmt"
description = "Check clang-format on source files"
run = "sh tasks/format.sh"
run_windows = "& .\\tasks\\format.ps1"

[tasks."format:fix"]
description = "Auto-format source files"
run = "FORMAT_FIX=1 sh tasks/format.sh"
run_windows = "$env:FORMAT_FIX='1'; & .\\tasks\\format.ps1"

[tasks.lint]
description = "Run clang-tidy on all source files (slow)"
run = "sh tasks/lint.sh"
run_windows = "& .\\tasks\\lint.ps1"

[tasks."lint:changed"]
description = "Run clang-tidy on git-dirty files only (fast)"
run = "LINT_CHANGED=1 sh tasks/lint.sh"
run_windows = "$env:LINT_CHANGED='1'; & .\\tasks\\lint.ps1"

[tasks."lint:fix"]
alias = "fix"
description = "Run clang-tidy with auto-fix (CAUTION: can break cross-file refs)"
run = "LINT_FIX=1 LINT_CHANGED=1 sh tasks/lint.sh"
run_windows = "$env:LINT_FIX='1'; $env:LINT_CHANGED='1'; & .\\tasks\\lint.ps1"

[tasks.cppcheck]
description = "Run cppcheck static analysis"
run = "sh tasks/cppcheck.sh"
run_windows = "& .\\tasks\\cppcheck.ps1"

# Test

[tasks.test]
alias = "t"
description = "Run unit tests"
depends = ["build"]
run = "sh tasks/test.sh"
run_windows = "& .\\tasks\\test.ps1"

[tasks."test:e2e"]
description = "Run E2E tests (slow)"
depends = ["build"]
run = "TEST_SUITE=e2e sh tasks/test.sh"
run_windows = "$env:TEST_SUITE='e2e'; & .\\tasks\\test.ps1"

[tasks."test:all"]
description = "Run unit + E2E tests"
depends = ["build"]
run = "TEST_SUITE=all sh tasks/test.sh"
run_windows = "$env:TEST_SUITE='all'; & .\\tasks\\test.ps1"

[tasks."test:filter"]
alias = "tf"
description = "Run unit tests with gtest filter"
depends = ["build"]
usage = 'arg "filter" help="gtest --gtest_filter value"'
run = "TEST_FILTER=\"{{arg(name='filter')}}\" sh tasks/test.sh"
run_windows = "$env:TEST_FILTER='{{arg(name=''filter'')}}'; & .\\tasks\\test.ps1"

# Profiling

[tasks.profile]
alias = "prof"
description = "Build with Tracy profiler (Debug)"
run = "sh tasks/profile.sh"
run_windows = "& .\\tasks\\profile.ps1"

[tasks."profile:release"]
alias = "profr"
description = "Build with Tracy profiler (RelWithDebInfo)"
run = "PROFILE_MODE=release sh tasks/profile.sh"
run_windows = "$env:PROFILE_MODE='release'; & .\\tasks\\profile.ps1"

[tasks."profile:capture"]
alias = "cap"
description = "Launch Recurse and capture a Tracy trace (30s)"
run = "sh tasks/profile-capture.sh"
run_windows = "& .\\tasks\\profile-capture.ps1"

[tasks."profile:capture-release"]
alias = "capr"
description = "Launch Release build and capture a Tracy trace (30s)"
run = "PROFILE_MODE=release sh tasks/profile-capture.sh"
run_windows = "$env:PROFILE_MODE='release'; & .\\tasks\\profile-capture.ps1"

[tasks."profile:view"]
description = "Open the latest .tracy capture in Tracy Profiler"
run = """
latest="$(ls -t tracy/*.tracy 2>/dev/null | head -1)"
if [ -z "$latest" ]; then echo "No .tracy files in tracy/"; exit 1; fi
echo "Opening $latest"
tracy-profiler "$latest"
"""
run_windows = """
$latest = Get-ChildItem tracy\\*.tracy | Sort-Object LastWriteTime -Descending | Select-Object -First 1
if (-not $latest) { Write-Error 'No .tracy files in tracy\\'; exit 1 }
Write-Host "Opening $($latest.Name)"
tracy-profiler $latest.FullName
"""

[tasks."profile:csv"]
description = "Export the latest .tracy capture to CSV"
run = """
latest="$(ls -t tracy/*.tracy 2>/dev/null | head -1)"
if [ -z "$latest" ]; then echo "No .tracy files in tracy/"; exit 1; fi
echo "=== Zone stats (inclusive) ==="
tracy-csvexport "$latest"
echo ""
echo "=== Zone stats (self-time) ==="
tracy-csvexport -e "$latest"
"""

# Analysis

[tasks.sanitize]
description = "Build and test with ASan + UBSan"
run = "sh tasks/sanitize.sh"
run_windows = "& .\\tasks\\sanitize.ps1"

[tasks."sanitize:tsan"]
description = "Build and test with ThreadSanitizer"
run = "SANITIZE_PRESET=ci-tsan sh tasks/sanitize.sh"
run_windows = "$env:SANITIZE_PRESET='ci-tsan'; & .\\tasks\\sanitize.ps1"

[tasks.coverage]
description = "Build with coverage and generate report"
run = "sh tasks/coverage.sh"
run_windows = "& .\\tasks\\coverage.ps1"

[tasks.codeql]
description = "Run CodeQL security analysis locally"
depends = ["build"]
run = "sh tasks/codeql.sh"
run_windows = "& .\\tasks\\codeql.ps1"
